<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Asset Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-header { border-radius: 12px 12px 0 0 !important; background: linear-gradient(135deg, #1e293b, #0f172a) !important; border-bottom: none; padding: 1.25rem 1.5rem; }
        .table-hover tbody tr { transition: all 0.2s ease; }
        .table-hover tbody tr:hover { background-color: #f8fafc; transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .badge { font-weight: 500; letter-spacing: 0.5px; padding: 0.5em 0.85em; border-radius: 6px; }
        .btn-action { border-radius: 8px; padding: 0.35rem 0.6rem; transition: all 0.2s; }
        .btn-action:hover { transform: scale(1.05); }
        code.serial-box { background-color: #f1f5f9; color: #475569; padding: 4px 8px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 0.85em; }
        /* Style untuk tombol pagination aktif agar sesuai tema */
        .pagination .page-item.active .page-link { background-color: #1e293b; border-color: #1e293b; }
        .pagination .page-link { color: #475569; }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Asset Dashboard</h2>
            <p class="text-muted mb-0">Kelola dan pantau semua inventaris perusahaan</p>
        </div>
        <span id="apiStatusBadge" class="badge bg-success-subtle text-success border border-success-subtle pb-2"><i class="bi bi-wifi me-1"></i> API Connected</span>
    </div>

    <div class="card">
        <div class="card-header text-white d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 py-3">
            <h5 class="mb-0 fw-semibold text-center"><i class="bi bi-box-seam me-2"></i>Daftar Aset IT & Fasilitas</h5>
            <button class="btn btn-primary btn-sm rounded-pill px-4 shadow-sm text-nowrap" data-bs-toggle="modal" data-bs-target="#addAssetModal">
                <i class="bi bi-plus-lg me-1"></i> Tambah Aset
            </button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 text-center text-nowrap">
                    <thead class="table-light text-muted" style="font-size: 0.9em;">
                        <tr>
                            <th class="py-3">ID</th>
                            <th class="py-3 text-start">Nama Aset</th>
                            <th class="py-3">Kategori</th>
                            <th class="py-3">Nomor Seri</th>
                            <th class="py-3">Status</th>
                            <th class="py-3">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="assetTableBody">
                        <tr><td colspan="6" class="py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white border-0 d-flex flex-column flex-lg-row justify-content-between align-items-center gap-3 py-3 rounded-bottom">
            <div class="d-flex flex-column flex-sm-row align-items-center gap-2 text-center">
                <div class="d-flex align-items-center justify-content-center">
                    <span class="text-muted small me-2 fw-semibold text-nowrap">Tampilkan:</span>
                    <select class="form-select form-select-sm border-0 bg-light fw-bold" id="rowsPerPageSelect" style="width: 70px; cursor: pointer;" onchange="changeRowsPerPage()">
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                    </select>
                </div>
                <span class="text-muted small mt-2 mt-sm-0" id="pageInfo">Memuat info...</span>
            </div>
            
            <ul class="pagination pagination-sm mb-0 shadow-sm flex-wrap justify-content-center" id="paginationControls"></ul>
        </div>
    </div>
</div>

<div class="modal fade" id="addAssetModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-primary text-white border-0">
        <h5 class="modal-title fw-semibold"><i class="bi bi-plus-circle me-2"></i>Aset Baru</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="addAssetForm">
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">NAMA ASET</label><input type="text" class="form-control form-control-lg bg-light border-0" id="inputName" required placeholder="Contoh: Router Cisco 2960"></div>
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">KATEGORI</label>
            <select class="form-select form-select-lg bg-light border-0" id="inputCategory">
                <option>IT Equipment</option><option>Network Infrastructure</option>
                <option>Facility Infrastructure</option><option>Vehicle</option>
            </select>
          </div>
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">NOMOR SERI</label><input type="text" class="form-control form-control-lg bg-light border-0" id="inputSerial" required placeholder="Contoh: SN-CSC-001"></div>
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">STATUS</label>
            <select class="form-select form-select-lg bg-light border-0" id="inputStatus">
                <option>Active</option><option>In Repair</option><option>Maintenance</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mt-3 shadow-sm">Simpan Data</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editAssetModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-warning text-dark border-0">
        <h5 class="modal-title fw-semibold"><i class="bi bi-pencil-square me-2"></i>Edit Data Aset</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="editAssetForm">
          <input type="hidden" id="editId"> 
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">NAMA ASET</label><input type="text" class="form-control form-control-lg bg-light border-0" id="editName" required></div>
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">KATEGORI</label>
            <select class="form-select form-select-lg bg-light border-0" id="editCategory">
                <option>IT Equipment</option><option>Network Infrastructure</option>
                <option>Facility Infrastructure</option><option>Vehicle</option>
            </select>
          </div>
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">NOMOR SERI</label><input type="text" class="form-control form-control-lg bg-light border-0" id="editSerial" required></div>
          <div class="mb-3"><label class="text-muted small fw-bold mb-1">STATUS</label>
            <select class="form-select form-select-lg bg-light border-0" id="editStatus">
                <option>Active</option><option>In Repair</option><option>Maintenance</option>
            </select>
          </div>
          <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold mt-3 shadow-sm">Update Data</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
